name: Code Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --config tarpaulin.toml --engine llvm

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./target/coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/coverage/

      - name: Check coverage thresholds
        run: |
          echo "Coverage thresholds:"
          echo "- Overall: 80%+"
          echo "- Core packages: 85%+"
          echo "- Infrastructure: 80%+"
          echo "- Tools: 75%+"
          echo "- CLI: 70%+"

          # This will fail if coverage is below threshold (set in tarpaulin.toml)
          cargo tarpaulin --config tarpaulin.toml --engine llvm --fail-under 80
