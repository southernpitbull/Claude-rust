version: '3.8'

services:
  claude-code:
    build: .
    image: claude-code:latest
    container_name: claude-code
    ports:
      - "3000:3000"
    volumes:
      - claude-data:/home/claude/.claude
      - ${PWD}:/workspace:rw
    working_dir: /workspace
    environment:
      - CLAUDE_HOME=/home/claude/.claude
    command: ["serve", "--host", "0.0.0.0", "--port", "3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "./claude-code", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ollama:
    image: ollama/ollama:latest
    container_name: claude-code-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    profiles: ["ollama"]

  lmstudio:
    image: ghcr.io/lmstudio/core:latest
    container_name: claude-code-lmstudio
    ports:
      - "1234:1234"
    volumes:
      - lmstudio-data:/app/models
    restart: unless-stopped
    profiles: ["lmstudio"]

volumes:
  claude-data:
    driver: local
  ollama-data:
    driver: local
  lmstudio-data:
    driver: local